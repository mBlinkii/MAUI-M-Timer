name: Release

# Runs on every version tag, e.g.: git tag v1.1.9 && git push origin v1.1.9
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version, interface, and date
        id: meta
        run: |
          TOC="MauiMPlusTimer/MauiMPlusTimer.toc"
          # Version comes from the git tag that triggered this run, so the
          # release/zip/CurseForge version always matches what was tagged,
          # even if the .toc's own "## Version:" line lags behind.
          VERSION="${GITHUB_REF_NAME#v}"
          IFACE=$(grep -oP '^## Interface:\s*\K.+' "$TOC" | tr -d '\r ')
          DATE=$(date +%Y-%m-%d)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zipname=MauiMPlusTimer-v${VERSION}-${DATE}" >> "$GITHUB_OUTPUT"

          # Convert "120005,..." Interface values to "12.0.5,..." for CurseForge.
          VERSIONS=""
          IFS=',' read -ra ARR <<< "$IFACE"
          for I in "${ARR[@]}"; do
            V="$((10#$I / 10000)).$(((10#$I % 10000) / 100)).$((10#$I % 100))"
            VERSIONS="${VERSIONS:+$VERSIONS,}$V"
          done
          echo "game_versions=$VERSIONS" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Copy this version's section body from CHANGELOG.md: everything
          # between its "## [x.y.z]" heading and the next "## [" heading.
          # Matching only on "## [x.y.z]" keeps suffixes like "- Unreleased"
          # or the release date working.
          awk -v ver="$VERSION" '
            /^## \[/ { insec = (index($0, "## [" ver "]") == 1); next }
            insec { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          # Trim leading blank lines.
          sed -i '/./,$!d' RELEASE_NOTES.md

          # Every release must ship its changelog on GitHub/CurseForge/Wago,
          # so a missing section is a hard error, not a silent fallback.
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No section for version ${VERSION} found in CHANGELOG.md - add it before tagging." >&2
            exit 1
          fi

          echo "Release notes for v${VERSION}:"
          cat RELEASE_NOTES.md

          # Expose the notes as a (multi-line) step output for action inputs.
          {
            echo "body<<NOTES_EOF"
            cat RELEASE_NOTES.md
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

          # CurseForge stores changelogs natively as HTML; markdown sent through
          # its API renders lossy (newlines collapse, "#"/backticks get escaped),
          # so the CurseForge upload gets a proper HTML conversion instead.
          pip install --quiet markdown
          python3 -m markdown RELEASE_NOTES.md > RELEASE_NOTES.html

          {
            echo "body_html<<NOTES_EOF"
            cat RELEASE_NOTES.html
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Subversion
        run: sudo apt-get update -qq && sudo apt-get install -y -qq subversion

      - name: Fetch Ace3 + helper libraries into Libs/
        run: |
          set -e
          LIBS="MauiMPlusTimer/Libs"
          mkdir -p "$LIBS"

          svn export --force https://repos.curseforge.com/wow/libstub/trunk "$LIBS/LibStub"
          svn export --force https://repos.curseforge.com/wow/callbackhandler/trunk/CallbackHandler-1.0 "$LIBS/CallbackHandler-1.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceAddon-3.0 "$LIBS/AceAddon-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceEvent-3.0 "$LIBS/AceEvent-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceConsole-3.0 "$LIBS/AceConsole-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceTimer-3.0 "$LIBS/AceTimer-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceDB-3.0 "$LIBS/AceDB-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceDBOptions-3.0 "$LIBS/AceDBOptions-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceGUI-3.0 "$LIBS/AceGUI-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceConfig-3.0 "$LIBS/AceConfig-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceLocale-3.0 "$LIBS/AceLocale-3.0"
          svn export --force https://repos.curseforge.com/wow/libsharedmedia-3-0/trunk/LibSharedMedia-3.0 "$LIBS/LibSharedMedia-3.0"
          svn export --force https://repos.curseforge.com/wow/ace-gui-3-0-shared-media-widgets/trunk "$LIBS/AceGUI-3.0-SharedMediaWidgets"

          git clone --depth 1 https://github.com/rossnichols/LibSerialize.git "$LIBS/LibSerialize"
          rm -rf "$LIBS/LibSerialize/.git"
          git clone --depth 1 https://github.com/SafeteeWoW/LibDeflate.git "$LIBS/LibDeflate"
          rm -rf "$LIBS/LibDeflate/.git"

      - name: Build zip
        run: |
          rm -f MauiMPlusTimer/.pkgmeta
          # Zip from the repo root, referencing the folder by name, so
          # "MauiMPlusTimer/" itself is the top-level entry in the archive
          # (required for WoW/CurseForge - not just its contents).
          zip -r "${{ steps.meta.outputs.zipname }}.zip" "MauiMPlusTimer" -x "MauiMPlusTimer/.git*"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Ver. ${{ steps.meta.outputs.version }}
          files: ${{ steps.meta.outputs.zipname }}.zip
          # Release notes come from CHANGELOG.md (see the notes step above)
          # instead of auto-generated commit lists.
          body_path: RELEASE_NOTES.md

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_TOKEN }}
          project_id: "1599022"
          game_endpoint: wow
          file_path: ${{ steps.meta.outputs.zipname }}.zip
          display_name: MAUI M+ Timer v${{ steps.meta.outputs.version }}
          game_versions: ${{ steps.meta.outputs.game_versions }}
          release_type: release
          changelog: ${{ steps.notes.outputs.body_html }}
          changelog_type: html

      - name: Upload to Wago Addons
        run: |
          GAME_VERSION=$(echo "${{ steps.meta.outputs.game_versions }}" | cut -d',' -f1)
          # Build the metadata JSON with jq (correct escaping of the multi-line
          # markdown changelog) and write it to a file. It is passed to curl as
          # '-F "metadata=<file"', which sends the raw file content as the field
          # value - passing the JSON inline would let curl interpret commas,
          # semicolons and newlines inside it as -F syntax and corrupt the field
          # (Wago then rejects it with "metadata must be a valid JSON string").
          jq -n \
            --arg label "${{ steps.meta.outputs.version }}" \
            --arg patch "$GAME_VERSION" \
            --rawfile changelog RELEASE_NOTES.md \
            '{label: $label, stability: "stable", supported_retail_patch: $patch, changelog: $changelog}' \
            > wago_metadata.json

          # "|| true" keeps the step alive under "bash -e" when curl fails at
          # the network level (exit != 0, HTTP_CODE "000"), so status and body
          # are still printed and the check below produces a clear failure.
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -F "metadata=<wago_metadata.json" \
            -F "file=@${{ steps.meta.outputs.zipname }}.zip" \
            -H "Authorization: Bearer ${{ secrets.WAGO_API_TOKEN }}" \
            -H "Accept: application/json" \
            "https://addons.wago.io/api/projects/QN53AvKB/version") || true

          echo "HTTP status: ${HTTP_CODE:-000}"
          echo "Response body:"
          cat response.json 2>/dev/null || echo "(no response body)"
          echo

          if [ "${HTTP_CODE:-0}" -lt 200 ] || [ "${HTTP_CODE:-0}" -ge 300 ]; then
            echo "Wago upload failed." >&2
            exit 1
          fi
