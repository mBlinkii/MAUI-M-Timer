name: Release

# Runs on every version tag, e.g.: git tag v1.1.9 && git push origin v1.1.9
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version, interface, and date
        id: meta
        run: |
          TOC="MauiMPlusTimer/MauiMPlusTimer.toc"
          # Version comes from the git tag that triggered this run, so the
          # release/zip/CurseForge version always matches what was tagged,
          # even if the .toc's own "## Version:" line lags behind.
          VERSION="${GITHUB_REF_NAME#v}"
          IFACE=$(grep -oP '^## Interface:\s*\K.+' "$TOC" | tr -d '\r ')
          DATE=$(date +%Y-%m-%d)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zipname=MauiMPlusTimer-v${VERSION}-${DATE}" >> "$GITHUB_OUTPUT"

          # Convert "120005,..." Interface values to "12.0.5,..." for CurseForge.
          VERSIONS=""
          IFS=',' read -ra ARR <<< "$IFACE"
          for I in "${ARR[@]}"; do
            V="$((10#$I / 10000)).$(((10#$I % 10000) / 100)).$((10#$I % 100))"
            VERSIONS="${VERSIONS:+$VERSIONS,}$V"
          done
          echo "game_versions=$VERSIONS" >> "$GITHUB_OUTPUT"

      - name: Install Subversion
        run: sudo apt-get update -qq && sudo apt-get install -y -qq subversion

      - name: Fetch Ace3 + helper libraries into Libs/
        run: |
          set -e
          LIBS="MauiMPlusTimer/Libs"
          mkdir -p "$LIBS"

          svn export --force https://repos.curseforge.com/wow/libstub/trunk "$LIBS/LibStub"
          svn export --force https://repos.curseforge.com/wow/callbackhandler/trunk/CallbackHandler-1.0 "$LIBS/CallbackHandler-1.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceAddon-3.0 "$LIBS/AceAddon-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceEvent-3.0 "$LIBS/AceEvent-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceConsole-3.0 "$LIBS/AceConsole-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceTimer-3.0 "$LIBS/AceTimer-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceDB-3.0 "$LIBS/AceDB-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceDBOptions-3.0 "$LIBS/AceDBOptions-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceGUI-3.0 "$LIBS/AceGUI-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceConfig-3.0 "$LIBS/AceConfig-3.0"
          svn export --force https://repos.curseforge.com/wow/ace3/trunk/AceLocale-3.0 "$LIBS/AceLocale-3.0"
          svn export --force https://repos.curseforge.com/wow/libsharedmedia-3-0/trunk/LibSharedMedia-3.0 "$LIBS/LibSharedMedia-3.0"
          svn export --force https://repos.curseforge.com/wow/ace-gui-3-0-shared-media-widgets/trunk "$LIBS/AceGUI-3.0-SharedMediaWidgets"

          git clone --depth 1 https://github.com/rossnichols/LibSerialize.git "$LIBS/LibSerialize"
          rm -rf "$LIBS/LibSerialize/.git"
          git clone --depth 1 https://github.com/SafeteeWoW/LibDeflate.git "$LIBS/LibDeflate"
          rm -rf "$LIBS/LibDeflate/.git"

      - name: Build zip
        run: |
          rm -f MauiMPlusTimer/.pkgmeta
          # Zip from the repo root, referencing the folder by name, so
          # "MauiMPlusTimer/" itself is the top-level entry in the archive
          # (required for WoW/CurseForge - not just its contents).
          zip -r "${{ steps.meta.outputs.zipname }}.zip" "MauiMPlusTimer" -x "MauiMPlusTimer/.git*"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Ver. ${{ steps.meta.outputs.version }}
          files: ${{ steps.meta.outputs.zipname }}.zip
          generate_release_notes: true

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_TOKEN }}
          project_id: "1599022"
          game_endpoint: wow
          file_path: ${{ steps.meta.outputs.zipname }}.zip
          display_name: MAUI M+ Timer v${{ steps.meta.outputs.version }}
          game_versions: ${{ steps.meta.outputs.game_versions }}
          release_type: release
